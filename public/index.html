    <style>
      html, body, #root { min-height: 100%; margin: 0; }
      body {
          background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 50%),
                      radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent 50%),
                      #0f131d;
          background-attachment: fixed;
          color: #dfe2f1;
          font-family: 'Inter', sans-serif;
      }
      .glass-panel {
          background: rgba(23, 27, 38, 0.4);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-panel:hover {
          border-color: rgba(173, 198, 255, 0.3);
          box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.1);
          transform: scale(1.01);
          transition: all 0.3s ease;
      }
      .gradient-text {
          background: linear-gradient(to right, #adc6ff, #4cd7f6);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
      }
      .bg-radial-main {
          background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 50%),
                      radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent 50%),
                      #0f131d;
      }
      .shimmer-purple {
          background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
          background-size: 200% 100%;
      }
      .zk-shimmer {
          background: linear-gradient(90deg, rgba(139, 92, 246, 0.1), rgba(139, 92, 246, 0.4), rgba(139, 92, 246, 0.1));
          background-size: 200% 100%;
      }
      @keyframes pulse-ring {
          0% { transform: scale(.33); opacity: 0; }
          80%, 100% { opacity: 0; }
      }
      .pulse-dot::before {
          content: '';
          position: absolute;
          width: 300%;
          height: 300%;
          border-radius: 50%;
          background-color: currentColor;
          opacity: 0.2;
          animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
      }
      .pulsing-dot::after {
          content: '';
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          background: currentColor;
          opacity: 0.4;
          animation: pulse 2s infinite;
      }
      @keyframes pulse {
          0% { transform: scale(1); opacity: 0.4; }
          100% { transform: scale(3); opacity: 0; }
      }
    </style>

  <body class="bg-radial-main text-on-background font-body-md overflow-x-hidden">
