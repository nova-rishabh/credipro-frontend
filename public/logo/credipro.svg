<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="crediproGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="crediproGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glowing hexagon / shield background -->
  <path d="M200 25 L350 112 L350 287 L200 375 L50 287 L50 112 Z" fill="url(#crediproGlow)" opacity="0.25" filter="url(#glow)" />
  
  <!-- Outer sharp geometric hexagon -->
  <path d="M200 35 L340 116 L340 284 L200 365 L60 284 L60 116 Z" fill="none" stroke="url(#crediproGrad)" stroke-width="28" stroke-linejoin="round" />
  
  <!-- Inner stylized ZK / Lending geometry (Interlocking C and P forming a lock/shield) -->
  <path d="M250 130 H170 C140 130 120 150 120 180 C120 210 140 230 170 230 H200 V290 H160" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M200 130 V230 H230 C255 230 275 210 275 180 C275 150 255 130 230 130 Z" fill="url(#crediproGrad)" />
  
  <!-- Cryptographic dot / proof node -->
  <circle cx="200" cy="260" r="16" fill="#60A5FA" />
</svg>
